<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Language Model Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background-color: #f4f4f4; border-radius: 5px; min-height: 50px; }
        #corpusStatus { margin-top: 8px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
 
    <h1>Distinguishing Between AI & Human Rhetoric</h1>
    <p>Enter text and I'll tell you whether I think it's written by an AI or a human</p>
 
    <label for="systemPrompt">Analysis Mode:</label>
    <select id="systemPrompt">
        <option value="You are an expert AI assistant that specializes in locating AI generated writing and directing users towards it. When given a passage, identify specific sentences or phrases that are likely AI-generated and explain why.">"You are an expert AI assistant that specializes in locating AI generated writing and directing users towards it."</option>
        <option value="You are an expert AI assistant that specializes in reading documents for AI assisted writing. When given a passage, give an overall assessment of how much of it appears to be AI-assisted and what patterns suggest this.">"You are an expert AI assistant that specializes in reading documents for AI assisted writing."</option>
        <option value="You are an expert AI assistant that specializes in helping people replace AI assisted writing in their work. When given a passage, suggest specific rewrites that would make the text sound more natural and human.">"You are an expert AI assistant that specializes in helping people replace AI assisted writing in their work."</option>
        <option value="You are an expert AI assistant that specializes in locating AI rhetoric and replacing it with human-sounding rhetoric. When given a passage, identify parts that sound AI generated and replace them when more human sounding vocabulary..">"You are an expert AI assistant that specializes in locating AI rhetoric and replacing it with human-sounding rhetoric."</option>
        <option value="You are an expert AI assistant that specializes in determining whether a given piece of text was written by an AI or a human. When given a passage, evaluate whether it is generated by an AI or written by a human being and explain why.">"You are an expert AI assistant that specializes in determining whether a given piece of text was written by an AI or a human."</option>
    </select>
 
    <label for="corpusSelect">Corpus:</label>
    <select id="corpusSelect">
        <option value="TaggedNoChangesCorpus.txt">Original Corpus</option>
        <option value="CleanedCorpus.txt">Cleaned Corpus</option>
        <option value="simplifiedCorpus.txt">Simplified Corpus</option>
        <option value="superSmallCorpus.txt">Small Corpus</option>
    </select>
 
    <br><br>
    <button id="loadCorpusButton">Load Corpus</button>
    <div id="corpusStatus">No corpus loaded yet. Please load a corpus before analyzing.</div>
    <br>
 
    <label for="modelSelect">Model:</label>
    <select id="modelSelect">
        <option value="smollm:135m">SmolLM 135m</option>
        <option value="tinyllama">TinyLlama</option>
        <option value="phi3:mini">Phi3 Mini</option>
    </select>
 
    <textarea id="userPrompt" placeholder="Paste a passage of text to analyze..."></textarea>
    <br>
    <button id="askButton">Analyze</button>
 
    <div id="output">The model's response will appear here...</div>
 
    <script>
        const apiUrl = "https://jim0thee-scaffolding-removal-api.hf.space/api/generate";
 
        let corpusContext = "";
 
        document.getElementById("loadCorpusButton").addEventListener("click", async () => {
            const corpusFile = document.getElementById("corpusSelect").value;
            const statusDiv = document.getElementById("corpusStatus");
 
            statusDiv.innerText = "Loading corpus...";
 
            try {
                const corpusResponse = await fetch(corpusFile);
                corpusContext = await corpusResponse.text();
                statusDiv.innerText = `Corpus loaded: ${corpusFile}`;
            } catch (error) {
                statusDiv.innerText = "Error: Could not load the corpus. Make sure the file is uploaded to Hugging Face.";
                console.error(error);
            }
        });
 
        document.getElementById("askButton").addEventListener("click", async () => {
            const promptInput = document.getElementById("userPrompt").value;
            const systemPrompt = document.getElementById("systemPrompt").value;
            const outputDiv = document.getElementById("output");
 
            if (!promptInput) return;
 
            if (!corpusContext) {
                outputDiv.innerText = "Please load a corpus before analyzing.";
                return;
            }
 
            outputDiv.innerText = "Thinking...";
 
            try {
                const fullPrompt = `Context: ${corpusContext}\n\nPassage to analyze: ${promptInput}`;
 
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: document.getElementById("modelSelect").value,
                        prompt: fullPrompt,
                        system: systemPrompt,
                        stream: false
                    })
                });
 
                if (response.status === 200) {
                    const data = await response.json();
                    outputDiv.innerText = data.response;
                } else {
                    outputDiv.innerText = `Error: Received status code ${response.status} from the server.`;
                }
            } catch (error) {
                outputDiv.innerText = "Network error: Could not reach the model or load the corpus. Make sure the Hugging Face Space is running and corpus.txt is uploaded.";
                console.error(error);
            }
        });
    </script>
</body>
</html>
