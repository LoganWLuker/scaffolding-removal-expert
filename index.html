<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Language Model Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background-color: #f4f4f4; border-radius: 5px; min-height: 50px; }
    </style>
</head>
<body>

    <h1>Distinguishing Between AI & Human Rhetoric</h1>
    <p>Enter text and I'll tell you whether I think it's written by an AI or a human</p>

        <label for="systemPrompt">Analysis Mode:</label>
    <select id="systemPrompt">
        <option value="You are an expert AI assistant that specializes in locating AI generated writing and directing users towards it.">"You are an expert AI assistant that specializes in locating AI generated writing and directing users towards it."</option>
        <option value="You are an expert AI assistant that specializes in reading documents for AI assisted writing.">"You are an expert AI assistant that specializes in reading documents for AI assisted writing."</option>
        <option value="You are an expert AI assistant that specializes in helping people replace AI assisted writing in their work.">"You are an expert AI assistant that specializes in helping people replace AI assisted writing in their work."</option>
        <option value="You are an expert AI assistant that specializes in locating AI rhetoric and replacing it with human-sounding rhetoric.">"You are an expert AI assistant that specializes in locating AI rhetoric and replacing it with human-sounding rhetoric."</option>
        <option value="You are an expert AI assistant that specializes in determining whether a given piece of text was written by an AI or a human.">"You are an expert AI assistant that specializes in determining whether a given piece of text was written by an AI or a human."</option>
    </select>

        <label for="corpusSelect">Corpus:</label>
    <select id="corpusSelect">
        <option value="TaggedNoChangesCorpus.txt">Original Corpus</option>
        <option value="CleanedCorpus.txt">Cleaned Corpus</option>
    </select>

        <label for="modelSelect">Model:</label>
    <select id="modelSelect">
        <option value="hyperobjects">Hyperobjects (current)</option>
        <option value="smollm:135m">SmolLM 135m</option>
        <option value="llama3.2">Llama 3.2</option>
    </select>

    <textarea id="userPrompt" placeholder="Paste a passage of text to analyze..."></textarea>
    <br>
    <button id="askButton">Analyze</button>

    <div id="output">The model's response will appear here...</div>

       <script>
        const apiUrl = "https://jim0thee-scaffolding-removal-api.hf.space/api/generate";
 
        document.getElementById("askButton").addEventListener("click", async () => {
            const promptInput = document.getElementById("userPrompt").value;
            const systemPrompt = document.getElementById("systemPrompt").value;
            const outputDiv = document.getElementById("output");
 
            if (!promptInput) return;
            outputDiv.innerText = "Thinking...";
   
            try {
                // Fetch the corpus from the selected file
                const corpusFile = document.getElementById("corpusSelect").value;
                const corpusResponse = await fetch(corpusFile);
                const corpusContext = await corpusResponse.text();

                // Combine corpus context with user input
                const fullPrompt = `Context: ${corpusContext}\n\nPassage to analyze: ${promptInput}`;

                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: document.getElementById("modelSelect").value,
                        prompt: fullPrompt,
                        system: systemPrompt,
                        stream: false
                    })
                });
 
                if (response.status === 200) {
                    const data = await response.json();
                    outputDiv.innerText = data.response;
                } else {
                    outputDiv.innerText = `Error: Received status code ${response.status} from the server.`;
                }
            } catch (error) {
                outputDiv.innerText = "Network error: Could not reach the model or load the corpus. Make sure the Hugging Face Space is running and corpus.txt is uploaded.";
                console.error(error);
            }
        });
    </script>
</body>
</html>
