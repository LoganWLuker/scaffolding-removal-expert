<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Language Model Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background-color: #f4f4f4; border-radius: 5px; min-height: 50px; }
    </style>
</head>
<body>

    <h1>Hyperobjects AI</h1>
    <p>Ask a question about hyperobjects or ecological philosophy.</p>

    <textarea id="userPrompt" placeholder="E.g., What is a hyperobject?"></textarea>
    <br>
    <button id="askButton">Ask Model</button>

    <div id="output">The model's response will appear here...</div>

    <script>
        // Replace this URL with your actual Hugging Face Space Direct URL
        // It usually looks like: https://YOUR_USERNAME-YOUR_SPACE_NAME.hf.space/api/generate
        const apiUrl = "https://jim0thee-scaffolding-removal-api.hf.space/api/generate";

        document.getElementById("askButton").addEventListener("click", async () => {
            const promptInput = document.getElementById("userPrompt").value;
            const outputDiv = document.getElementById("output");
            
            if (!promptInput) return;

            outputDiv.innerText = "Thinking...";

            // 1. The Corpus Context
            const corpusContext = "A hyperobject is an entity so massive that it is distributed across vast scales of space and time, making it impossible for humans to grasp in its entirety. Coined by philosopher Timothy Morton, the term is often used in the context of environmental issues like global warming, which have effects that are felt globally and over long periods, but are not visible as a single, discrete object.";

            // 2. The Combined Prompt (In-Context Learning)
            const fullPrompt = `Context: ${corpusContext}\n\nQuestion: ${promptInput}`;

            // 3. The API Request
            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "hyperobjects",
                        prompt: fullPrompt,
                        stream: false // Set to false to get the whole response at once
                    })
                });

                // Check the numerical status code to ensure a successful response
                if (response.status === 200) {
                    const data = await response.json();
                    outputDiv.innerText = data.response;
                } else {
                    outputDiv.innerText = `Error: Received status code ${response.status} from the server.`;
                }

            } catch (error) {
                outputDiv.innerText = "Network error: Could not reach the model. Make sure the Hugging Face Space is running.";
                console.error(error);
            }
        });
    </script>
</body>
</html>
